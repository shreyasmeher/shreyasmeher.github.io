project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!drafts/"
    - "!assignments/"
  resources:
    - CNAME

website:
  title: "Shreyas Meher"
  description: "Postdoctoral Researcher in Computational Social Science"
  favicon: favicon.ico
  site-url: "https://shreyasmeher.github.io"
  repo-url: "https://github.com/shreyasmeher/shreyasmeher.github.io"
  search: false

  page-navigation: true
  back-to-top-navigation: true

  twitter-card:
    creator: "@shreyasmhr"
    card-style: summary_large_image
    title: "Shreyas Meher | Postdoctoral Researcher"
    description: "Research in Digital Governance, Democratic Backsliding, and Computational Politics."

  open-graph:
    title: "Shreyas Meher | Postdoctoral Researcher"
    description: "Research in Digital Governance, Democratic Backsliding, and Computational Politics."

  navbar:
    background: light
    left:
      - text: "Home"
        href: index.qmd
      - text: "Research"
        href: research.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Software"
        href: software.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "CV"
        href: CV.pdf
      - text: "Gallery"
        href: Gallery.qmd

    right:
      - icon: envelope
        href: mailto:meher@essb.eur.nl
        aria-label: Email
      - icon: twitter-x
        href: https://x.com/shreyasmhr
        aria-label: X
      - icon: github
        href: https://github.com/shreyasmeher
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/shreyasmeher/
        aria-label: LinkedIn

  page-footer:
    left: |
      &copy; 2026 Shreyas Meher
      Erasmus School of Social and Behavioural Sciences
      Erasmus University Rotterdam
    right: |
      Built with [Quarto](https://quarto.org)

format:
  html:
    theme:
      light: [litera, mystyles.scss]
      dark: [darkly, custom-dark.scss]
    toc: true
    toc-location: right
    toc-title: "On this page"
    code-copy: true
    code-overflow: wrap
    mainfont: "Source Serif 4"
    monofont: "ui-monospace, SFMono-Regular, SF Mono, Monaco, Consolas, Liberation Mono, Courier New, monospace"
    fontsize: 0.95em
    linestretch: 1.7
    html-math-method: katex
    footnotes-hover: true
    smooth-scroll: true
    link-external-newwindow: true
