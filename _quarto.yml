project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!drafts/"
  resources:
    - CNAME
    - bachelor-project/slides/**
    - favicon-16x16.png
    - favicon-32x32.png
    - apple-touch-icon.png
    - android-chrome-192x192.png
    - android-chrome-512x512.png
    - site.webmanifest

website:
  title: "Shreyas Meher"
  description: "Postdoctoral Researcher in Computational Social Science"
  favicon: favicon.ico
  site-url: "https://shreyasmeher.github.io"
  repo-url: "https://github.com/shreyasmeher/shreyasmeher.github.io"
  search: false

  twitter-card:
    creator: "@shreyasmhr"
    title: "Shreyas Meher"
    description: "Postdoctoral Researcher in Computational Social Science, Erasmus University Rotterdam."

  open-graph:
    title: "Shreyas Meher"
    description: "Postdoctoral Researcher in Computational Social Science, Erasmus University Rotterdam."

  navbar:
    background: light
    left:
      - text: "Home"
        href: index.qmd
      - text: "Research"
        href: research.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Gallery"
        href: Gallery.qmd
      - text: "CV"
        href: CV.pdf

  page-footer:
    left: "&copy; 2026 Shreyas Meher"
    right: "[Email](mailto:meher@essb.eur.nl) · [GitHub](https://github.com/shreyasmeher) · [X](https://x.com/shreyasmhr) · [LinkedIn](https://www.linkedin.com/in/shreyasmeher/)"

format:
  html:
    grid:
      body-width: 800px
    theme:
      light: [default, mystyles.scss]
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <link rel="manifest" href="/site.webmanifest">
